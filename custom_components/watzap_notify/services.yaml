send_text:
  name: Send Text
  description: Kirim pesan WhatsApp melalui WAHA.
  fields:
    chat_id:
      name: Chat ID
      description: ID chat tujuan, misalnya 62812xxxxxxx@c.us atau 1203630xxxxxxx@g.us.
      required: true
      example: "6281234567890@c.us"
      selector:
        text:
    message:
      name: Message
      description: Isi pesan.
      required: true
      example: "Pintu depan terbuka!"
      selector:
        text:

send_image:
  name: Send Image
  description: Kirim gambar dari URL melalui WAHA.
  fields:
    chat_id:
      name: Chat ID
      description: ID chat tujuan, personal atau grup.
      required: true
      example: "1203630xxxxxxxx@g.us"
      selector:
        text:
    image_url:
      name: Image URL
      description: URL publik gambar.
      required: true
      example: "https://example.com/image.jpg"
      selector:
        text:
    message:
      name: Caption
      description: Caption gambar.
      required: false
      example: "Status sistem hari ini."
      selector:
        text:
